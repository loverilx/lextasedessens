<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier | L'Extase des Sens</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        header { background: #fff; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 1000; width: 100%; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 1.2rem; color: #000; text-decoration: none; }
        nav { display: flex; gap: 20px; align-items: center; }
        nav a { text-decoration: none; color: #333; font-size: 0.95rem; }
        nav a.is-active, nav a:hover { color: #d63384; font-weight: 500; }
        .cart-link { text-decoration: none; color: #000; font-weight: 500; }
    </style>
</head>
<body>

    <!-- En-tête -->
    <header data-header>
        <div class="header-container">
            <a href="index.html" class="logo">L'Extase des Sens</a>
            <nav data-menu>
                <a href="index.html">Accueil</a>
                <a href="boutique.html">Boutique</a>
                <a href="guides.html">Guides</a>
                <a href="contact.html">Contact</a>
            </nav>
            <a href="panier.html" class="cart-link is-active">Panier <span data-cart-count>0</span></a>
        </div>
    </header>

    <!-- Contenu principal -->
    <main class="main-content">
        <div style="max-width: 800px; margin: 30px auto; padding: 0 20px;">
            <p style="color: #b5838d; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 10px;">VOTRE PANIER</p>
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Récapitulatif</h1>

            <!-- Avertissement Ni repris ni échangé -->
            <div style="background: #fff8f8; border: 1px solid #f5c6cb; padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; color: #721c24; margin-bottom: 30px;">
                <div style="font-size: 1.5em;">⚠️</div>
                <div>
                    <strong>Condition de vente :</strong> Pour des raisons d'hygiène et de sécurité, tous nos articles sont <strong>ni repris ni échangés</strong>.
                </div>
            </div>

            <!-- C'est ici que le JavaScript va injecter dynamiquement le détail des articles du panier -->
            <div data-cart-container>
                <p style="color: #666; font-style: italic;">Votre panier est vide ou en cours de chargement...</p>
            </div>
        </div>
    </main>

    <!-- Pied de page -->
    <footer style="padding: 20px 0; text-align: center; border-top: 1px solid #eaeaea; margin-top: 60px; color: #666; font-size: 0.9rem;">
        <div class="footer-container">
            <p>&copy; <span data-year></span> L'Extase des Sens. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
