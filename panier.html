<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Panier | L’Extase des Sens</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script defer src="assets/js/script.js"></script>
    <style>
        /* Style pour harmoniser l'affichage du logo dans le panier */
        [data-cart-page] img, [data-cart-page] svg, [data-cart-page] canvas {
            max-width: 80px !important;
            max-height: 80px !important;
            object-fit: contain;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header class="site-header is-scrolled" data-header>
        <div class="container header-inner">
            <a class="brand" href="index.html">
                <span class="brand-mark">E</span>
                <span>L'Extase<br><em>des Sens</em></span>
            </a>
            <nav class="main-nav">
                <a href="index.html">Accueil</a>
                <a href="boutique.html">Boutique</a>
                <a href="blog.html">Guides</a>
                <a href="contact.html">Contact</a>
                <a class="nav-cart is-current" href="panier.html">Panier <span data-cart-count>0</span></a>
            </nav>
        </div>
    </header>

    <main class="cart-main">
        <div class="container">
            <p class="eyebrow">Votre sélection</p>
            <h1>Votre panier</h1>

            <!-- Avertissement Ni repris ni échangé -->
            <div style="background: #fff8f8; border: 1px solid #f5c6cb; padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; color: #721c24; margin-bottom: 25px;">
                <div style="font-size: 1.5em;">⚠️</div>
                <div>
                    <strong>Condition de vente :</strong> Pour des raisons d'hygiène et de sécurité, tous nos articles sont <strong>ni repris ni échangés</strong>.
                </div>
            </div>

            <!-- Conteneur officiel du panier géré par script.js -->
            <section data-cart-page></section>
        </div>
    </main>

    <!-- Script pour remplacer les images du panier par votre logo -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const imagesPanier = document.querySelectorAll('[data-cart-page] img, [data-cart-page] svg, [data-cart-page] canvas');
                imagesPanier.forEach(el => {
                    // Remplace l'élément par une image propre pointant vers votre logo (à adapter si besoin selon le chemin de votre logo)
                    const logoImg = document.createElement('img');
                    logoImg.src = 'assets/images/logo.png'; // Remplacez par le chemin exact de votre logo si nécessaire
                    logoImg.alt = "L'Extase des Sens";
                    logoImg.style.width = '70px';
                    logoImg.style.height = '70px';
                    logoImg.style.objectFit = 'contain';
                    el.replaceWith(logoImg);
                });
            }, 100); // Petit délai pour laisser le script.js d'origine charger le panier d'abord
        });
    </script>
</body>
</html>
